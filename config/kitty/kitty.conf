include ~/.cache/wal/colors-kitty.conf
# Font
#font_family      JetBrainsMono Nerd Font Mono
italic_font auto
bold_italic_font auto
font_size 12

# Theme
#background #1a1b26
#foreground #c0caf5
#selection_background #2c3e50
#selection_foreground #c0caf5
#url_color #d65c9d

# Cursor
#cursor #8fee96
#

enable_audio_bell no

term xterm-256color
background_opacity 0.85
#color0  #000000
#color8  #44475a

#color1  #ff5555
#color9  #ff5555

#color2  #50fa7b
#color10 #50fa7b

#color3  #f1fa8c
#color11 #f1fa8c

#color4  #bd93f9
#color12 #bd93f9

#color5  #ff79c6
#color13 #ff79c6

#color6  #8be9fd
#color14 #8be9fd

#color7  #bbbbbb
#color15 #ffffff
