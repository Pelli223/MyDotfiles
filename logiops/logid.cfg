devices: ({
    name: "MX Master 4";
     smartshift:
    {
        on: true;
        threshold: 30;
        torque: 50;
    };


    hiresscroll:
    {
        hires: false;
    };

    dpi: 1600;

    buttons: (
        {
            # Botón del pulgar (gestos)
            cid: 0xc3;
            action =
            {
                type: "Gestures";
                gestures: (

                    # Click sin gesto → Vista de actividades / overview
                    {
                        direction: "None";
                        mode: "OnRelease";
                        action =
                        {
                            type: "Keypress";
                            keys: ["KEY_LEFTMETA"];
                        };
                    },

                    # Arriba → Vista de ventanas / escritorios
                    {
                        direction: "Up";
                        mode: "OnRelease";
                        action =
                        {
                            type: "Keypress";
                            keys: ["KEY_LEFTCTRL", "KEY_LEFTALT", "KEY_UP"];
                        };
                    },

                    # Abajo → Mostrar escritorio
                    {
                        direction: "Down";
                        mode: "OnRelease";
                        action =
                        {
                            type: "Keypress";
                            keys: ["KEY_LEFTCTRL", "KEY_LEFTALT", "KEY_DOWN"];
                        };
                    },

                    # Izquierda → Escritorio anterior
                    {
                        direction: "Left";
                        mode: "OnRelease";
                        action =
                        {
                            type: "Keypress";
                            keys: ["KEY_LEFTCTRL", "KEY_LEFTALT", "KEY_LEFT"];
                        };
                    },

                    # Derecha → Escritorio siguiente
                    {
                        direction: "Right";
                        mode: "OnRelease";
                        action =
                        {
                            type: "Keypress";
                            keys: ["KEY_LEFTCTRL", "KEY_LEFTALT", "KEY_RIGHT"];
                        };
                    }
                );
            };
        }
    );
});

